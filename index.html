<!DOCTYPE html>
<html>
<head>
    <title>Asphalt 1: The New Arising</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        
        /* Splash Screen */
        #splash-screen { 
            position: absolute; inset: 0; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 200; pointer-events: auto;
        }
        #splash-screen h1 { font-size: 60px; text-align: center; margin-bottom: 40px; color: #4facfe; text-shadow: 0 0 20px #4facfe; }

        /* Lobby/Garage */
        #lobby-menu { position: absolute; inset: 0; display: none; align-items: center; justify-content: space-between; padding: 0 40px; background: radial-gradient(circle, #111 0%, #000 100%); pointer-events: auto; }
        .panel { width: 340px; background: rgba(10,10,10,0.95); border: 2px solid #4facfe; padding: 25px; border-radius: 15px; }
        
        #game-hud { position: absolute; inset: 0; display: none; padding: 20px; }
        #progress-track { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 70%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .tracker-icon { position: absolute; width: 10px; height: 10px; border-radius: 50%; top: -3px; transition: left 0.1s; border: 1px solid #000; }
        #player-icon { background: #4facfe; z-index: 10; width: 14px; height: 14px; top: -5px; box-shadow: 0 0 10px #4facfe; }
        .cpu-icon { background: #ff4444; }

        #mph-display { position: absolute; bottom: 50px; right: 60px; text-align: right; }
        #mph-num { font-size: 100px; font-weight: 900; line-height: 0.8; }
        #countdown { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 150px; font-weight: 900; color: #4facfe; display: none; z-index: 20; }
        
        #boost-container { position: absolute; bottom: 160px; right: 60px; width: 200px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid #00f2ff; display: none; }
        #boost-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #0077ff, #00f2ff); box-shadow: 0 0 10px #00f2ff; }
        #boost-label { position: absolute; top: -20px; font-size: 10px; color: #00f2ff; font-weight: bold; }

        #podium-screen { position: absolute; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; z-index: 100; }
        .podium-box { display: flex; align-items: flex-end; gap: 15px; height: 250px; margin-top: 40px; }
        .step { width: 110px; background: #111; border: 1px solid #4facfe; display: flex; flex-direction: column; align-items: center; padding-top: 10px; position: relative; font-size: 11px; }
        .p1 { height: 200px; border-color: #ffcc00; border-width: 2px; }
        
        button { background: #4facfe; border: none; color: white; padding: 15px; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; width: 100%; border-radius: 5px; margin-top: 5px; transition: 0.2s; font-size: 14px; }
        button:hover { filter: brightness(1.2); }
        .active-sel { background: #4facfe !important; box-shadow: 0 0 15px #4facfe; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; font-family: 'Orbitron'; width: 88%; margin-bottom: 12px; }
        
        #promo-btn { background: #ffcc00; color: #000; margin-top: 15px; font-size: 12px; padding: 8px; }
        #car-list { max-height: 250px; overflow-y: auto; scrollbar-width: thin; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="splash-screen">
        <h1>ASPHALT 1:<br>THE NEW ARISING</h1>
        <button onclick="enterLobby()" style="width: 250px; font-size: 24px;">PLAY</button>
    </div>

    <div id="lobby-menu">
        <div class="panel">
            <h3 style="color:#4facfe; margin:0 0 15px 0;">GARAGE</h3>
            <input type="text" id="driver-name" placeholder="DRIVER NAME">
            <button id="race-btn" onclick="startRace()" style="background:#4facfe; color:white; margin-bottom:10px;">START CAREER</button>
            <div id="car-list"></div>
            <button id="promo-btn" onclick="redeemCode()">REDEEM PROMO CODE</button>
        </div>
        <div style="text-align:right;">
            <h1 id="car-name-top" style="font-size: 40px; margin:0; width: 500px; overflow: hidden;">CAR NAME</h1>
            <h2 id="cash-display" style="color:#ffcc00;">$0</h2>
            <p id="boss-status" style="color:#4facfe; font-size:12px;"></p>
        </div>
    </div>

    <div id="game-hud">
        <div id="countdown">3</div>
        <div id="progress-track"><div id="player-icon" class="tracker-icon"></div></div>
        <div id="boost-container">
            <div id="boost-label">NITRO / HYBRID DRIVE</div>
            <div id="boost-bar"></div>
        </div>
        <div id="mph-display"><div id="mph-num">0</div><div style="font-size: 18px; color: #4facfe; letter-spacing: 5px;">MPH</div></div>
    </div>

    <div id="podium-screen">
        <h1 id="win-status" style="color:#ffcc00; font-size: 40px; margin:0;">RACE RESULTS</h1>
        <div class="podium-box" id="podium-list"></div>
        <button onclick="backToLobby()" style="width: 280px; margin-top: 40px;">RETURN TO GARAGE</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

const carModels = [
    { name: "BMW M4", price: 0, color: "#0077ff", speed: 42, acc: 0.38, hybrid: false },
    { name: "ASTON MARTIN DB11", price: 3200, color: "#2d5a27", speed: 48, acc: 0.42, hybrid: false },
    { name: "LAMBORGHINI COUNTACH", price: 7500, color: "#ffffff", speed: 52, acc: 0.45, hybrid: false },
    { name: "FERRARI 458 ITALIA", price: 15000, color: "#ff2200", speed: 64, acc: 0.50, hybrid: false },
    { name: "SLS AMG BLACK", price: 28000, color: "#ffcc00", speed: 68, acc: 0.53, hybrid: false },
    { name: "FERRARI F40", price: 45000, color: "#ff0000", speed: 72, acc: 0.58, hybrid: false },
    { name: "PORSCHE 911 TURBO S", price: 65000, color: "#c0c0c0", speed: 76, acc: 0.65, hybrid: false },
    { name: "FERRARI 296 GTB", price: 85000, color: "#cc0000", speed: 80, acc: 0.55, hybrid: true },
    { name: "LAMBORGHINI MURCIELAGO", price: 110000, color: "#ff6600", speed: 82, acc: 0.52, hybrid: false },
    { name: "GEMERA", price: 150000, color: "#2c3e50", speed: 84, acc: 0.58, hybrid: true },
    { name: "MCLAREN ARTURA", price: 220000, color: "#dfff00", speed: 85, acc: 0.60, hybrid: true },
    { name: "LAMBORGHINI HURACAN", price: 350000, color: "#39ff14", speed: 86, acc: 0.68, hybrid: false },
    { name: "PORSCHE 918 SPYDER", price: 450000, color: "#9e9e9e", speed: 89, acc: 0.70, hybrid: true },
    { name: "TAYCAN TURBO GT", price: 550000, color: "#8e44ad", speed: 92, acc: 0.78, hybrid: true },
    { name: "MCLAREN W1", price: 1200000, color: "#ff8c00", speed: 96, acc: 0.70, hybrid: true },
    { name: "FERRARI F80", price: 1500000, color: "#ff0000", speed: 98, acc: 0.72, hybrid: true },
    { name: "BUGATTI CHIRON SS", price: 3500000, color: "#001a4d", speed: 115, acc: 0.62, hybrid: false },
    { name: "BUGATTI BOLIDE", price: 5000000, color: "#00d4ff", speed: 112, acc: 0.95, hybrid: false }
];

// PERSISTENT DATA
let cash = parseInt(localStorage.getItem('f_cash')) || 0;
let owned = JSON.parse(localStorage.getItem('f_owned')) || new Array(carModels.length).fill(false);
owned[0] = true;
let bossBeaten = JSON.parse(localStorage.getItem('f_boss')) || new Array(carModels.length).fill(false);
bossBeaten[0] = true;
let selIdx = parseInt(localStorage.getItem('f_sel')) || 0;
let dName = localStorage.getItem('f_name') || "ACE";
let usedCodes = JSON.parse(localStorage.getItem('f_used_codes')) || {};

let boostCharge = 100;
let isBoosting = false;
let player = { dist: 0, speed: 0, worldX: 0, model: carModels[selIdx], crashed: false, crashTimer: 0 };
let cpus = [];
let keys = {};
let state = "SPLASH";
let active = false;
let shake = 0;

function enterLobby() {
    document.getElementById("splash-screen").style.display = "none";
    document.getElementById("lobby-menu").style.display = "flex";
    state = "LOBBY";
    updateUI();
}

function backToLobby() {
    document.getElementById("podium-screen").style.display = "none";
    document.getElementById("lobby-menu").style.display = "flex";
    state = "LOBBY";
    updateUI();
}

function redeemCode() {
    let code = prompt("ENTER PROMO CODE:").toUpperCase();
    if (usedCodes[code]) { alert("CODE ALREADY USED!"); return; }
    if (code === "#BOBGOBISTHEBEST#") { owned[11] = true; usedCodes[code] = true; alert("UNLOCKED: HURACÁN!"); }
    else if (code === "#HEARTBOBGOBRESPOSITORIES#") { cash += 200000; usedCodes[code] = true; alert("+$200,000!"); }
    else { alert("INVALID CODE"); return; }
    save(); updateUI();
}

function updateUI() {
    document.getElementById("cash-display").innerText = "$" + cash.toLocaleString();
    document.getElementById("car-name-top").innerText = carModels[selIdx].name;
    document.getElementById('driver-name').value = dName;
    
    const isBoss = !bossBeaten[selIdx];
    document.getElementById("race-btn").innerText = isBoss ? "BOSS CHALLENGE" : "START CAREER";
    document.getElementById("boss-status").innerText = isBoss ? "STATUS: BOSS NOT DEFEATED" : "STATUS: CAR UNLOCKED";

    const list = document.getElementById("car-list"); list.innerHTML = "";
    carModels.forEach((m, i) => {
        let isSel = (selIdx === i);
        let btnText = owned[i] ? (isSel ? 'SELECTED' : 'SELECT') : '$' + m.price.toLocaleString();
        let btnColor = owned[i] ? (isSel ? "#4facfe" : "#111") : (cash >= m.price ? "#4facfe" : "#333");
        list.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <span style="font-size:9px; width: 140px;">${m.name}</span>
            <button onclick="${owned[i]?'selectCar('+i+')':'buyCar('+i+')'}" class="${isSel?'active-sel':''}" style="width:110px; font-size:10px; padding:8px; background:${btnColor}">${btnText}</button>
        </div>`;
    });
}

function selectCar(i) { selIdx = i; player.model = carModels[i]; save(); updateUI(); }
function buyCar(i) { if(cash >= carModels[i].price) { cash -= carModels[i].price; owned[i] = true; selectCar(i); } }

const RACE_DIST = 1000000; 

function startRace() {
    dName = document.getElementById('driver-name').value || "DRIVER";
    localStorage.setItem('f_name', dName);
    state = "RACE"; player.dist = 0; player.speed = 0; player.worldX = 0; player.crashed = false;
    active = false; boostCharge = 100;
    
    document.getElementById("lobby-menu").style.display = "none";
    document.getElementById("game-hud").style.display = "block";
    const track = document.getElementById("progress-track");
    track.innerHTML = '<div id="player-icon" class="tracker-icon"></div>';

    cpus = [];
    if (!bossBeaten[selIdx]) {
        // BOSS BATTLE
        track.innerHTML += `<div id="boss-icon" class="tracker-icon" style="background:#ffcc00; width:16px; height:16px; top:-6px; z-index:11;"></div>`;
        cpus.push({ id: "boss", name: "BOSS", dist: -2000, x: 0, speed: 0, target: player.model.speed * 1.05, color: "#000", crashed: false, isBoss: true });
    } else {
        // CAREER RACE
        const names = ["VIPER", "SHADOW", "BLITZ", "RAZOR", "GHOST", "HUNTER"];
        for(let i=0; i<6; i++) {
            let id = "cpu" + i;
            track.innerHTML += `<div id="${id}-icon" class="tracker-icon cpu-icon"></div>`;
            cpus.push({ id: id, name: names[i], dist: -5000 * (i + 1), x: (i%2==0?-0.8:0.8), speed: 0, target: player.model.speed * (0.95 + Math.random()*0.12), color: "#444", crashed: false, isBoss: false });
        }
    }

    let count = 3;
    const cd = document.getElementById("countdown");
    cd.style.display = "block"; cd.innerText = count;
    let timer = setInterval(() => {
        count--;
        if(count > 0) cd.innerText = count;
        else if(count === 0) cd.innerText = "GO!";
        else { cd.style.display = "none"; active = true; clearInterval(timer); }
    }, 1000);
}

function drawCar(x, y, scale, color, isWrecked, braking) {
    let w = 210 * scale, h = 85 * scale;
    ctx.save(); ctx.translate(x, y);
    if(isWrecked) ctx.rotate((Math.random()-0.5)*0.3);
    ctx.fillStyle = color; ctx.beginPath(); ctx.roundRect(-w/2, -h/4, w, h/2, 8*scale); ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.beginPath(); ctx.moveTo(-w*0.2, -h/4); ctx.lineTo(w*0.2, -h/4); ctx.lineTo(w*0.12, -h/1.2); ctx.lineTo(-w*0.12, -h/1.2); ctx.fill();
    let lc = braking ? "#f00" : "#500";
    ctx.shadowBlur = braking ? 15 : 0; ctx.shadowColor = "red";
    ctx.fillStyle = lc; ctx.fillRect(-w*0.48, -h/6, w/6, h/10); ctx.fillRect(w*0.48 - w/6, -h/6, w/6, h/10); 
    ctx.restore();
}

function loop() {
    ctx.save();
    if(shake > 0) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake *= 0.9; }
    ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0,0,canvas.width, canvas.height);

    if (state === "LOBBY") {
        drawCar(canvas.width/2, canvas.height * 0.7, 2.2, carModels[selIdx].color, false, false);
    } 
    else if (state === "RACE") {
        if(player.dist >= RACE_DIST) { 
            state = "PODIUM"; 
            document.getElementById("game-hud").style.display = "none"; 
            document.getElementById("podium-screen").style.display = "flex";
            let res = [{n: dName, d: player.dist}, ...cpus.map(c => ({n: c.name, d: c.dist}))].sort((a,b)=>b.d-a.d);
            
            if (!bossBeaten[selIdx] && res[0].n === dName) {
                bossBeaten[selIdx] = true;
                document.getElementById("win-status").innerText = "BOSS DEFEATED!";
            } else {
                document.getElementById("win-status").innerText = "RACE RESULTS";
            }

            const pList = document.getElementById("podium-list"); pList.innerHTML = "";
            res.forEach((r, i) => {
                let h = 200 - (i * 20);
                pList.innerHTML += `<div class="step ${i===0?'p1':''}" style="height:${h}px"><div style="position:absolute; top:-30px; width:100%; text-align:center;">${r.n}</div>${i+1}</div>`;
            });
            cash += (res[0].n === dName) ? 10000 : 2000;
            save(); return; 
        }

        document.getElementById("boost-container").style.display = player.model.hybrid ? "block" : "none";
        let braking = false;
        if(active && !player.crashed) {
            let max = player.model.speed, acc = player.model.acc;
            if (player.model.hybrid && keys.shift && boostCharge > 0 && (keys.arrowup || keys.w)) {
                isBoosting = true; max += 15; acc *= 2.2; boostCharge -= 0.6; shake = 3; 
            } else { isBoosting = false; if (boostCharge < 100) boostCharge += 0.15; }
            if(keys.arrowup || keys.w) player.speed = Math.min(player.speed + acc, max);
            else { player.speed *= 0.985; braking = true; }
            if(keys.arrowleft || keys.a) player.worldX -= 0.07;
            if(keys.arrowright || keys.d) player.worldX += 0.07;
            document.getElementById("boost-bar").style.width = boostCharge + "%";
        } else if (player.crashed) { player.speed *= 0.95; if(Date.now() > player.crashTimer) player.crashed = false; }

        player.dist += player.speed * 20;
        player.worldX = Math.max(-1.4, Math.min(1.4, player.worldX));
        document.getElementById("player-icon").style.left = (Math.max(0, player.dist) / RACE_DIST * 100) + "%";
        
        cpus.forEach(c => {
            if(active) {
                if(!c.crashed) {
                    let band = (player.dist - c.dist > 3000) ? 1.15 : 1.0;
                    c.speed = Math.min(c.speed + 0.4, c.target * band);
                } else { c.speed *= 0.92; if(Date.now() > c.crashTimer) c.crashed = false; }
            }
            c.dist += c.speed * 19.5;
            let iconId = c.isBoss ? "boss-icon" : c.id+"-icon";
            document.getElementById(iconId).style.left = (Math.max(0, c.dist) / RACE_DIST * 100) + "%";
            if(active && !c.crashed && Math.abs(c.dist - player.dist) < 1500 && Math.abs(c.x - player.worldX) < 0.5) {
                player.crashed = true; player.crashTimer = Date.now() + 800; player.speed *= 0.5; shake = 15;
            }
        });

        ctx.fillStyle = "#151515"; ctx.beginPath();
        ctx.moveTo(canvas.width/2 - 800, canvas.height); ctx.lineTo(canvas.width/2, canvas.height*0.4); ctx.lineTo(canvas.width/2+800, canvas.height); ctx.fill();
        cpus.forEach(c => {
            let pZ = c.dist - player.dist;
            if(pZ > -2500 && pZ < 40000) {
                let s = canvas.height / Math.max(100, pZ + 5000);
                drawCar(canvas.width/2 + (c.x - player.worldX) * s * 600, (canvas.height*0.4)+(s*400), s*2.8, c.color, c.crashed, false);
            }
        });
        if (isBoosting) { ctx.shadowBlur = 30; ctx.shadowColor = "#00f2ff"; }
        drawCar(canvas.width/2, canvas.height-180, 1.4, player.model.color, player.crashed, braking);
        ctx.shadowBlur = 0;
        document.getElementById("mph-num").innerText = Math.floor(player.speed * 4.8);
    }
    ctx.restore(); requestAnimationFrame(loop);
}

function save() { 
    localStorage.setItem('f_cash', cash); localStorage.setItem('f_owned', JSON.stringify(owned)); 
    localStorage.setItem('f_sel', selIdx); localStorage.setItem('f_name', dName); 
    localStorage.setItem('f_used_codes', JSON.stringify(usedCodes));
    localStorage.setItem('f_boss', JSON.stringify(bossBeaten));
}
window.onkeydown = e => { keys[e.key.toLowerCase()] = true; if(e.key === "Shift") keys.shift = true; };
window.onkeyup = e => { keys[e.key.toLowerCase()] = false; if(e.key === "Shift") keys.shift = false; };
loop();
</script>
</body>
</html>
